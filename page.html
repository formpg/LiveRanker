<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ライブランカー</title>
<meta name="description" content="お笑いライブの順位投票を、QRコードでかんたんに。">
<meta property="og:title" content="ライブランカー">
<meta property="og:description" content="お笑いライブの順位投票を、QRコードでかんたんに。">
<meta property="og:type" content="website">
<meta property="og:locale" content="ja_JP">
<style>
  :root{
    --ink:#1a1a1a; --paper:#fbf7ef; --line:#e3dccb;
    --accent:#e8421b; --accent-dk:#b32f0f; --gold:#c79a3a;
    --ok:#2f7d4f; --muted:#8a8270;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    line-height:1.6;-webkit-text-size-adjust:100%}
  .wrap{max-width:680px;margin:0 auto;padding:20px 16px 60px}
  h1{font-size:1.5rem;letter-spacing:.04em;margin:.2em 0}
  h2{font-size:1.15rem;border-bottom:2px solid var(--ink);padding-bottom:6px;margin-top:32px}
  h3{font-size:1rem;margin:18px 0 8px}
  .eyebrow{font-size:.72rem;letter-spacing:.25em;color:var(--accent);font-weight:700}
  button{font:inherit;cursor:pointer;border:none;border-radius:8px;padding:12px 18px;
    background:var(--ink);color:#fff;font-weight:700;letter-spacing:.03em;transition:.15s}
  button:hover{transform:translateY(-1px)}
  button:disabled{opacity:.4;cursor:not-allowed;transform:none}
  button.primary{background:var(--accent)}
  button.primary:hover{background:var(--accent-dk)}
  button.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  button.danger{background:#fff;color:var(--accent-dk);border:1.5px solid var(--accent-dk)}
  button.sm{padding:7px 12px;font-size:.85rem}
  input,select,textarea{font:inherit;width:100%;padding:11px 12px;border:1.5px solid var(--line);
    border-radius:8px;background:#fff;margin:4px 0}
  textarea{min-height:120px;resize:vertical;font-family:ui-monospace,monospace}
  label{font-size:.85rem;font-weight:700;color:var(--muted);display:block;margin-top:12px}
  .card{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:18px;margin:14px 0;
    box-shadow:0 2px 0 var(--line)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .row > *{flex:0 0 auto}
  .grow{flex:1 1 auto}
  table{width:100%;border-collapse:collapse;margin-top:10px}
  th,td{text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
  th{font-size:.8rem;color:var(--muted);letter-spacing:.05em}
  .rank{font-weight:800;font-size:1.1rem;color:var(--accent);width:2.2em}
  .votes{font-variant-numeric:tabular-nums;font-weight:700}
  .pill{display:inline-block;border-radius:20px;padding:3px 11px;font-size:.78rem;font-weight:700;letter-spacing:.04em}
  .pill.closed{background:var(--accent);color:#fff}
  .pill.open{background:var(--ok);color:#fff}
  .pill.hidden{background:var(--muted);color:#fff}
  .pw{font-family:ui-monospace,monospace;font-weight:700;letter-spacing:.08em;
    background:#f3eee1;padding:2px 8px;border-radius:5px}
  .muted{color:var(--muted);font-size:.88rem}
  .err{color:var(--accent-dk);font-weight:700}
  .hide{display:none!important}
  .tabbar{display:flex;gap:6px;border-bottom:2px solid var(--ink);margin:18px 0;flex-wrap:wrap}
  .tabbar button{background:none;color:var(--muted);border-radius:8px 8px 0 0;padding:9px 14px}
  .tabbar button.on{background:var(--ink);color:#fff}
  .qrbox{text-align:center;padding:14px;background:#fff;border:1.5px dashed var(--line);border-radius:12px}
  .qrbox canvas,.qrbox img{max-width:240px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;
    box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:50;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .modal-bg{position:fixed;inset:0;background:rgba(20,20,20,.55);display:flex;
    align-items:center;justify-content:center;z-index:60;padding:18px}
  .modal{background:#fff;border-radius:16px;padding:24px;max-width:380px;width:100%;text-align:center}
  .big{font-size:2.4rem;font-weight:800;line-height:1.1;margin:10px 0}
  .voteopt{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--line);
    border-radius:12px;margin:8px 0;cursor:pointer;background:#fff}
  .voteopt.sel{border-color:var(--accent);background:#fdeee9;box-shadow:0 0 0 2px var(--accent) inset}
  .voteopt input{width:auto;margin:0}
  .voteopt.disabled{opacity:.45;cursor:not-allowed}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
  .logo{font-weight:900;letter-spacing:.12em;font-size:1.4rem;
    background:linear-gradient(135deg,var(--accent),#ff6b3d,var(--gold));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text}
  .notice{padding:16px;border-radius:12px;text-align:center;font-weight:700;margin:16px 0}
  .notice.closed{background:#fdeee9;color:var(--accent-dk);border:1.5px solid var(--accent)}
  .notice.hidden{background:#f1efe7;color:var(--muted);border:1.5px solid var(--line)}
  code.path{font-size:.8rem;background:#f3eee1;padding:1px 6px;border-radius:4px}
  .counter{font-weight:700;color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="logo">ライブランカー</div>
    <div id="navArea" class="row"></div>
  </div>

  <div id="setupWarn" class="card hide" style="border-color:var(--accent)">
    <span class="eyebrow">SETUP REQUIRED</span>
    <h3>Supabaseの設定がまだです</h3>
    <p class="muted">このHTML下部の <code class="path">SUPABASE_URL</code> と <code class="path">SUPABASE_ANON_KEY</code> に、ご自身のプロジェクトの値を貼り付けてください。同じ値を <code class="path">super.html</code> にも貼ります。</p>
  </div>

  <div id="view"></div>
</div>

<div id="toast" class="toast"></div>
<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

/* ===================================================================
   ① ここをあなたのSupabaseの値に貼り替えてください
   （Project URL は .supabase.co まで。末尾に /rest/v1/ は付けない）
   =================================================================== */
const SUPABASE_URL      = "https://drveyastfbnqsxpvvlhv.supabase.co";       // 例: https://xxxx.supabase.co
const SUPABASE_ANON_KEY = "sb_publishable_Gm2XPt0m70KE38BHWFCOTQ_m6YCThZr";  // anon public key（eyJ…で始まるJWTトークン）

/* =================================================================== */

const isConfigured = !SUPABASE_URL.startsWith("PASTE");
let sb = null;
if (isConfigured) sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
else document.getElementById("setupWarn").classList.remove("hide");

/* ---------- 小道具 ---------- */
const $ = s => document.querySelector(s);
const view = $("#view");
const esc = s => String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function genPw(n=4){const c="ABCDEFGHJKMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<n;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function nav(hash){location.hash=hash;}
async function rpc(fn,args){const {data,error}=await sb.rpc(fn,args);if(error)throw error;return data;}

function modal(html){
  return new Promise(resolve=>{
    const root=$("#modalRoot");
    root.innerHTML=`<div class="modal-bg"><div class="modal">${html}</div></div>`;
    root._resolve=resolve;
  });
}
function closeModal(val){const root=$("#modalRoot");const r=root._resolve;root.innerHTML="";if(r)r(val);}
window.closeModal=closeModal;

/* ================================================================ ルーター */
async function router(){
  if(!isConfigured)return;
  const h=location.hash.replace(/^#/,"")||"/";
  const seg=h.split("/").filter(Boolean);
  renderNav(seg[0]);
  view.innerHTML="<p class='muted'>読み込み中…</p>";
  try{
    if(seg.length===0) return home();
    if(seg[0]==="admin" && !seg[1]) return adminGate();
    if(seg[0]==="admin" && seg[1]) return adminLive(seg[1]);
    if(seg[0]==="vote" && seg[1]) return votePage(seg[1]);
    view.innerHTML="<p class='err'>ページが見つかりません</p>";
  }catch(e){view.innerHTML=`<p class='err'>エラー: ${esc(e.message||e)}</p>`;console.error(e);}
}
window.addEventListener("hashchange",router);
router();

function renderNav(top){
  const n=$("#navArea");
  if(top==="vote"){n.innerHTML="";return;}
  if(!top||top===""){
    n.innerHTML=`<button class="ghost sm" onclick="location.hash='/admin'">ライブ作成</button>`;
  }else{
    n.innerHTML=`<button class="ghost sm" onclick="location.hash='/'">トップ</button>`;
  }
}

/* ================================================================ ホーム */
async function home(){
  view.innerHTML=`
    <span class="eyebrow">LIVE RANKER</span>
    <h1>トップ画面</h1>
    <p class="muted">お笑いライブの順位投票を、QRコードでかんたんに。</p>
    <h2>ライブ一覧</h2>
    <div id="liveList"><p class="muted">読み込み中…</p></div>`;
  const lives=await rpc("list_lives");
  const list=$("#liveList");
  const visibleLives = lives ? lives.filter(l => !l.is_hidden) : [];
  if(visibleLives.length===0){list.innerHTML="<p class='muted'>まだライブがありません。右上の「ライブ作成」から作成できます。</p>";}
  else{
    list.innerHTML=visibleLives.map(l=>`
      <div class="card"><div class="topbar">
        <div><strong>${esc(l.name)}</strong>
          ${l.is_closed?'<span class="pill closed">締切中</span>':'<span class="pill open">受付中</span>'}
          <br><span class="muted">${esc(l.date||"日付未設定")}・お客さん ${l.audience_count}人・${l.vote_mode==="exact"?"ちょうど":"最大"}${l.votes_per_person}組</span></div>
        <button class="primary sm" onclick="openLive('${l.id}')">管理する</button>
      </div></div>`).join("");
  }
}

/* ================================================================ ライブ作成 */
async function adminGate(){
  view.innerHTML=`
    <span class="eyebrow">CREATE</span>
    <h1>ライブ作成</h1>
    <div class="card">
      <label>ライブ名</label>
      <input id="newName" placeholder="ライブ名を入力">
      <label>開催日</label>
      <input id="newDate" type="date">
      <label>お客さんの人数</label>
      <input id="newCount" type="number" min="1" value="30">
      <label>投票ルール</label>
      <div class="row">
        <select id="newVoteMode" style="width:auto;flex:0 0 auto">
          <option value="max">最大</option>
          <option value="exact">ちょうど</option>
        </select>
        <input id="newVpp" type="number" min="1" value="1" style="width:80px;flex:0 0 auto">
        <span class="muted">組選ぶ</span>
      </div>
      <label>管理者パスワード（自分で決めてください）</label>
      <input id="newAdminPw" placeholder="このライブを管理するためのパスワード">
      <p class="muted">⚠️ 管理者パスワードは作成後に確認できません。<strong>必ず控えてください。</strong></p>
      <button class="primary" id="createBtn">ライブを作成</button>
    </div>`;

  $("#createBtn").onclick=async()=>{
    const name=$("#newName").value.trim();
    const date=$("#newDate").value||null;
    const count=parseInt($("#newCount").value,10);
    const vpp=Math.max(parseInt($("#newVpp").value,10)||1,1);
    const voteMode=$("#newVoteMode").value;
    const adminPw=$("#newAdminPw").value.trim();
    if(!name){toast("ライブ名を入力してください");return;}
    if(!count||count<1){toast("人数を正しく入力してください");return;}
    if(!adminPw){toast("管理者パスワードを決めてください");return;}
    $("#createBtn").disabled=true;
    const set=new Set(); const pws=[];
    while(pws.length<count){const p=genPw(4);if(!set.has(p)){set.add(p);pws.push(p);}}
    const newId=await rpc("create_live",
      {p_name:name,p_date:date,p_count:count,p_admin_pw:adminPw,p_aud_pws:pws,p_votes_per_person:vpp,p_vote_mode:voteMode});
    await modal(`<span class="eyebrow">作成完了</span>
      <h3>${esc(name)}</h3>
      <p class="muted">設定した管理者パスワードでこのライブを管理できます。<br><strong>必ず控えてください。</strong></p>
      <button class="primary" onclick="closeModal()">OK</button>`);
    sessionStorage.setItem("apw:"+newId,adminPw);
    nav("/admin/"+newId);
  };
}

window.openLive=async function(id){
  const pw=await modal(`<span class="eyebrow">管理者ログイン</span>
    <h3>管理者パスワード</h3>
    <input id="mpw" placeholder="パスワード" autofocus>
    <div class="row" style="justify-content:center;margin-top:12px">
      <button class="ghost" onclick="closeModal(null)">やめる</button>
      <button class="primary" onclick="closeModal(document.getElementById('mpw').value.trim())">入る</button>
    </div>`);
  if(pw===null)return;
  const res=await rpc("admin_get_live",{p_live:id,p_admin_pw:pw});
  if(!res||res.error){toast("パスワードが違います");return;}
  sessionStorage.setItem("apw:"+id,pw);
  nav("/admin/"+id);
};

/* ================================================================ 管理者：ライブ詳細 */
async function adminLive(id){
  let adminPw=sessionStorage.getItem("apw:"+id);
  let live=null;
  if(adminPw){
    const r=await rpc("admin_get_live",{p_live:id,p_admin_pw:adminPw});
    if(r&&!r.error)live=r;
  }
  if(!live){
    view.innerHTML=`<div class="card"><h3>管理者ログイン</h3>
      <label>管理者パスワード</label><input id="gpw" autofocus>
      <button class="primary" id="gbtn">入る</button></div>`;
    $("#gbtn").onclick=async()=>{
      const pw=$("#gpw").value.trim();
      const r=await rpc("admin_get_live",{p_live:id,p_admin_pw:pw});
      if(r&&!r.error){sessionStorage.setItem("apw:"+id,pw);adminLive(id);}
      else toast("パスワードが違います");
    };
    return;
  }

  const voteUrl=location.origin+location.pathname+"#/vote/"+id;
  view.innerHTML=`
    <span class="eyebrow">ADMIN · ${esc(live.date||"")}</span>
    <h1>${esc(live.name)}
      ${live.is_closed?'<span class="pill closed">締切中</span>':'<span class="pill open">受付中</span>'}</h1>
    <div class="tabbar">
      <button data-t="rank" class="on">順位表</button>
      <button data-t="qr">投票QR</button>
      <button data-t="kouban">香盤・ユニット</button>
      <button data-t="pw">お客さんPW</button>
      <button data-t="info">ライブ情報</button>
    </div>
    <div id="tab"></div>`;
  const tab=$("#tab");
  let unsub=null;
  view.querySelectorAll(".tabbar button").forEach(b=>{
    b.onclick=()=>{
      if(unsub){unsub();unsub=null;}
      view.querySelectorAll(".tabbar button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      ({rank:tabRank,qr:tabQr,kouban:tabKouban,pw:tabPw,info:tabInfo}[b.dataset.t])();
    };
  });

  /* 順位表 + 締切ボタン */
  async function tabRank(){
    tab.innerHTML=`
      <div class="card">
        <div class="row">
          <div class="grow"><strong>投票の受付</strong><br>
            <span class="muted" id="closeState"></span></div>
          <button id="closeBtn"></button>
        </div>
      </div>
      <h2>順位表 <span class="muted">●LIVE</span></h2>
      <div id="rankBox"><p class="muted">集計中…</p></div>`;
    function paintCloseBtn(){
      $("#closeState").textContent = live.is_closed
        ? "現在は締め切っています。お客さんは投票できません。"
        : "現在受付中です。お客さんは投票できます。";
      const b=$("#closeBtn");
      b.textContent = live.is_closed ? "投票を再開する" : "投票を締め切る";
      b.className = live.is_closed ? "primary" : "danger";
      b.onclick=async()=>{
        const res=await rpc("set_live_closed",{p_live:id,p_admin_pw:adminPw,p_closed:!live.is_closed});
        if(res==="ok"){live.is_closed=!live.is_closed;paintCloseBtn();
          toast(live.is_closed?"投票を締め切りました":"投票を再開しました");}
        else toast("操作に失敗しました");
      };
    }
    paintCloseBtn();
    async function refresh(){
      const r=await rpc("get_ranking",{p_live:id,p_admin_pw:adminPw});
      const box=$("#rankBox"); if(!box)return;
      if(r.error){box.innerHTML="<p class='err'>認証エラー</p>";return;}
      if(!r.rows||r.rows.length===0){box.innerHTML="<p class='muted'>先に「香盤・ユニット」を登録してください。</p>";return;}
      box.innerHTML=`<p class="muted">投票した人 <strong>${r.total_voters}</strong>人 / ${live.audience_count}人　（総得票 ${r.total_picks}）</p>
        <table><thead><tr><th>順位</th><th>ユニット</th><th style="text-align:right">得票</th></tr></thead><tbody>
        ${r.rows.map((row,i)=>`<tr><td class="rank">${i+1}</td><td>${esc(row.name)}</td>
          <td class="votes" style="text-align:right">${row.votes}</td></tr>`).join("")}
        </tbody></table>`;
    }
    await refresh();
    const ch=sb.channel("rk:"+id)
      .on("postgres_changes",{event:"*",schema:"public",table:"vote_picks",filter:"live_id=eq."+id},refresh)
      .subscribe();
    unsub=()=>sb.removeChannel(ch);
  }

  /* QR */
  function tabQr(){
    tab.innerHTML=`<h2>投票用QRコード</h2>
      <p class="muted">会場に掲示してください。お客さんはこれを読み取って投票します。</p>
      <div class="qrbox"><div id="qrc"></div>
        <p class="muted" style="word-break:break-all">${esc(voteUrl)}</p></div>
      <div class="row" style="margin-top:12px">
        <button class="ghost" id="dlPng">画像で保存</button>
        <button class="ghost" id="dlPdf">PDFで保存</button></div>`;
    const holder=$("#qrc");
    new QRCode(holder,{text:voteUrl,width:240,height:240,correctLevel:QRCode.CorrectLevel.M});
    const getUrl=()=>{const img=holder.querySelector("img");const cv=holder.querySelector("canvas");
      return img?img.src:cv.toDataURL("image/png");};
    setTimeout(()=>{
      $("#dlPng").onclick=()=>{const a=document.createElement("a");a.href=getUrl();a.download=`QR_${live.name}.png`;a.click();};
      $("#dlPdf").onclick=()=>{const {jsPDF}=window.jspdf;const pdf=new jsPDF();
        pdf.setFontSize(18);pdf.text("Vote here",105,30,{align:"center"});
        pdf.addImage(getUrl(),"PNG",65,45,80,80);
        pdf.setFontSize(9);pdf.text(voteUrl,105,135,{align:"center"});
        pdf.save(`QR_${live.name}.pdf`);};
    },300);
  }

  /* 香盤 → ユニット */
  async function tabKouban(){
    const r=await rpc("get_live_public",{p_live:id});
    const units=r.units||[];
    const hasUnits=units.length>0;

    if(!hasUnits){
      tab.innerHTML=`<h2>香盤・ユニット</h2>
        <p class="muted">香盤を1行ずつ貼り付けてください。各行がユニットとして登録され、投票画面に反映されます。</p>
        <textarea id="kb" placeholder="1行につき1組ずつ入力"></textarea>
        <div class="row"><button class="primary" id="kbReg">この内容で登録</button></div>
        <h3>現在のユニット（0組）</h3>
        <p class="muted">まだ登録がありません。</p>`;
      $("#kbReg").onclick=async()=>{
        const names=$("#kb").value.split("\n").map(s=>s.trim()).filter(Boolean);
        if(names.length===0){toast("1行以上入力してください");return;}
        $("#kbReg").disabled=true;
        const payload=names.map(n=>({id:null,name:n}));
        const res=await rpc("save_units",{p_live:id,p_admin_pw:adminPw,p_units:payload});
        if(res==="ok"){toast(`${names.length}組を登録しました`);tabKouban();}
        else toast("登録に失敗しました");
      };
      return;
    }

    tab.innerHTML=`<h2>香盤・ユニット</h2>
      <div class="row" style="align-items:center">
        <h3 style="margin:0">現在のユニット（${units.length}組）</h3>
        <button class="ghost sm" id="kbEditBtn">&#9998; 編集</button>
      </div>
      <div id="ulist">
        <table><tbody>${units.map((u,i)=>`<tr><td class="muted">${i+1}</td><td>${esc(u.name)}</td></tr>`).join("")}</tbody></table>
      </div>
      <div id="kbEditArea" class="hide"></div>`;

    $("#kbEditBtn").onclick=async()=>{
      const ok=await modal(`<h3>香盤を編集しますか？</h3>
        <div class="row" style="justify-content:center;margin-top:12px">
          <button class="ghost" onclick="closeModal(false)">やめる</button>
          <button class="primary" onclick="closeModal(true)">編集する</button></div>`);
      if(!ok)return;
      const editList=units.map(u=>({id:u.id,name:u.name}));
      $("#ulist").classList.add("hide");
      $("#kbEditBtn").classList.add("hide");
      $("#kbEditArea").classList.remove("hide");
      renderEditUI(editList);
    };

    function renderEditUI(editList){
      const area=$("#kbEditArea");
      area.innerHTML=`
        <div id="editList">${editList.map((u,i)=>`
          <div class="row" style="margin:6px 0;align-items:center">
            <span class="muted" style="min-width:2em;text-align:center">${i+1}</span>
            <input class="grow" value="${esc(u.name)}" id="eu_${i}">
            <button class="danger sm" id="edel_${i}">削除</button>
          </div>`).join("")}
        </div>
        <button class="ghost" id="addUnit" style="width:100%;margin:8px 0">+ ユニットを追加</button>
        <div class="row" style="margin-top:12px">
          <button class="primary" id="saveUnits">保存</button>
          <button class="ghost" id="cancelEdit">キャンセル</button>
        </div>`;
      editList.forEach((u,i)=>{
        $(`#eu_${i}`).oninput=e=>{editList[i].name=e.target.value;};
        $(`#edel_${i}`).onclick=()=>{editList.splice(i,1);renderEditUI(editList);};
      });
      $("#addUnit").onclick=()=>{
        editList.push({id:null,name:""});
        renderEditUI(editList);
        $(`#eu_${editList.length-1}`).focus();
      };
      $("#saveUnits").onclick=async()=>{
        const valid=editList.filter(u=>u.name.trim());
        if(!valid.length){toast("1組以上入力してください");return;}
        $("#saveUnits").disabled=true;
        const payload=valid.map(u=>({id:u.id||null,name:u.name.trim()}));
        const res=await rpc("save_units",{p_live:id,p_admin_pw:adminPw,p_units:payload});
        if(res==="ok"){toast("保存しました");tabKouban();}
        else{toast("保存に失敗しました");$("#saveUnits").disabled=false;}
      };
      $("#cancelEdit").onclick=()=>tabKouban();
    }
  }

  /* お客さんPW */
  function tabPw(){
    const pws=live.audience_pws||[];
    tab.innerHTML=`<h2>お客さん用パスワード</h2>
      <p class="muted">${live.audience_count}人分。1人に1つずつ配ってください。</p>
      <div class="row" style="margin-bottom:10px">
        <button class="ghost sm" id="copyAll">全部コピー</button>
        <button class="ghost sm" id="pwPdf">PDFで保存</button></div>
      <div class="card"><div class="row" style="gap:8px">
        ${pws.map(p=>`<span class="pw">${p}</span>`).join(" ")}</div></div>`;
    $("#copyAll").onclick=()=>{navigator.clipboard.writeText(pws.join("\n"));toast("コピーしました");};
    $("#pwPdf").onclick=()=>{const {jsPDF}=window.jspdf;const pdf=new jsPDF();
      const pw=14, ph=297, cols=4, cellW=(210-pw*2)/cols, cellH=22;
      let y=18;
      pdf.setFontSize(16);pdf.setFont("helvetica","bold");
      pdf.setFontSize(18);pdf.text("Password",pw,y);y+=10;
      pdf.setDrawColor(180);pdf.setLineDashPattern([2,2],0);
      pdf.setFontSize(16);pdf.setFont("courier","bold");
      pws.forEach((p,i)=>{
        const col=i%cols, row=Math.floor(i/cols);
        const cx=pw+col*cellW, cy=y+row*cellH;
        if(cy+cellH>ph-10){pdf.addPage();y=18;return;}
        pdf.setLineDashPattern([2,2],0);pdf.setDrawColor(180);
        if(col===0)pdf.line(pw,cy,210-pw,cy);
        if(row===0||col>0)pdf.line(cx,y,cx,cy+cellH);
        pdf.setLineDashPattern([],0);
        pdf.text(p,cx+cellW/2,cy+cellH/2+2,{align:"center"});
      });
      const totalRows=Math.ceil(pws.length/cols);
      const bottomY=y+totalRows*cellH;
      pdf.setLineDashPattern([2,2],0);pdf.setDrawColor(180);
      pdf.line(pw,bottomY,210-pw,bottomY);
      pdf.line(pw,y,pw,bottomY);
      pdf.line(210-pw,y,210-pw,bottomY);
      pdf.save(`passwords_${live.name}.pdf`);};
  }

  /* ライブ情報編集（票数も編集可。PWは不可） */
  function tabInfo(){
    tab.innerHTML=`<h2>ライブ情報</h2>
      <div class="card">
        <label>ライブ名</label><input id="iName" value="${esc(live.name)}">
        <label>開催日</label><input id="iDate" type="date" value="${esc(live.date||"")}">
        <label>投票ルール</label>
        <div class="row">
          <select id="iVoteMode" style="width:auto;flex:0 0 auto">
            <option value="max" ${(live.vote_mode||"max")==="max"?"selected":""}>最大</option>
            <option value="exact" ${live.vote_mode==="exact"?"selected":""}>ちょうど</option>
          </select>
          <input id="iVpp" type="number" min="1" value="${live.votes_per_person}" style="width:80px;flex:0 0 auto">
          <span class="muted">組選ぶ</span>
        </div>
        <p class="muted">※ 管理者パスワード・お客さん人数はここでは変更できません。</p>
        <button class="primary" id="iSave">保存</button>
      </div>`;
    $("#iSave").onclick=async()=>{
      const vpp=Math.max(parseInt($("#iVpp").value,10)||1,1);
      const voteMode=$("#iVoteMode").value;
      const res=await rpc("update_live_info",
        {p_live:id,p_admin_pw:adminPw,p_name:$("#iName").value.trim(),
         p_date:$("#iDate").value||null,p_votes_per_person:vpp,p_vote_mode:voteMode});
      if(res==="ok"){live.name=$("#iName").value.trim();live.date=$("#iDate").value;
        live.votes_per_person=vpp;live.vote_mode=voteMode;toast("保存しました");}
      else toast("保存に失敗しました");
    };
  }

  tabRank();
}

/* ================================================================ お客さん投票画面 */
async function votePage(id){
  const r=await rpc("get_live_public",{p_live:id});
  if(!r||!r.id){view.innerHTML="<p class='err'>このライブは存在しません。</p>";return;}

  if(r.is_hidden){
    view.innerHTML=`<span class="eyebrow">VOTE</span><h1>${esc(r.name)}</h1>
      <div class="notice hidden">このライブは非表示です</div>`;
    return;
  }
  if(r.is_closed){
    view.innerHTML=`<span class="eyebrow">VOTE</span><h1>${esc(r.name)}</h1>
      <div class="notice closed">投票は締め切りました</div>`;
    return;
  }

  const units=r.units||[];
  const vpp=r.votes_per_person||1;
  const vmode=r.vote_mode||"max";
  const isExact=vmode==="exact";
  const ruleText=isExact?`ちょうど${vpp}組`:`最大${vpp}組`;
  view.innerHTML=`
    <span class="eyebrow">VOTE</span>
    <h1>${esc(r.name)}</h1>
    <div class="card">
      <label>あなたのパスワード</label>
      <input id="apw" placeholder="配られた4文字を入力" autocomplete="off">
      <p class="muted">パスワードを入れてから、良かったユニットを<strong>${ruleText}</strong>選んでください。</p>
    </div>
    ${units.length===0?"<p class='muted'>準備中です。しばらくお待ちください。</p>":`
    <p class="muted">選択中：<span class="counter" id="cnt">0</span> / ${vpp}組${isExact?" （ちょうど"+vpp+"組選んでください）":""}</p>
    <div id="opts">
      ${units.map(u=>`<label class="voteopt" data-id="${u.id}">
        <input type="checkbox" value="${u.id}"><span>${esc(u.name)}</span></label>`).join("")}
    </div>
    <button class="primary" id="submit" style="width:100%;margin-top:14px" ${isExact?"disabled":""}>投票する</button>`}`;

  const boxes=[...view.querySelectorAll(".voteopt input")];
  function selected(){return boxes.filter(b=>b.checked).map(b=>b.value);}
  function repaint(){
    const n=selected().length;
    $("#cnt").textContent=n;
    boxes.forEach(b=>{
      const opt=b.closest(".voteopt");
      opt.classList.toggle("sel",b.checked);
      const disable = !b.checked && n>=vpp;
      b.disabled=disable; opt.classList.toggle("disabled",disable);
    });
    const sub=$("#submit");
    if(sub) sub.disabled = isExact ? n!==vpp : false;
  }
  boxes.forEach(b=>b.onchange=repaint);

  const submit=$("#submit"); if(!submit)return;
  submit.onclick=async()=>{
    const pw=$("#apw").value.trim().toUpperCase();
    const picks=selected();
    if(!pw){toast("パスワードを入力してください");return;}
    if(picks.length===0){toast("ユニットを選んでください");return;}
    if(isExact&&picks.length!==vpp){toast(`ちょうど${vpp}組選んでください`);return;}
    let res=await rpc("cast_vote",{p_live:id,p_pw:pw,p_units:picks,p_overwrite:false});
    if(res==="bad_pw"){
      await modal(`<h3 class="err">パスワードが違います</h3>
        <p class="muted">配られたパスワードをもう一度ご確認ください。</p>
        <button class="primary" onclick="closeModal()">閉じる</button>`);return;
    }
    if(res==="hidden"){await modal(`<div class="notice hidden">このライブは非表示です</div>
      <button class="primary" onclick="closeModal()">閉じる</button>`);return;}
    if(res==="closed"){await modal(`<div class="notice closed">投票は締め切りました</div>
      <button class="primary" onclick="closeModal()">閉じる</button>`);return;}
    if(res==="count_over"){toast(isExact?`ちょうど${vpp}組選んでください`:`最大${vpp}組まで選べます`);return;}
    if(res==="exists"){
      const ok=await modal(`<h3>投票を修正しますか？</h3>
        <p class="muted">このパスワードはすでに投票済みです。<br>新しい選択で上書きできます。</p>
        <div class="row" style="justify-content:center;margin-top:12px">
          <button class="ghost" onclick="closeModal(false)">いいえ</button>
          <button class="primary" onclick="closeModal(true)">はい（修正する）</button></div>`);
      if(!ok)return;
      res=await rpc("cast_vote",{p_live:id,p_pw:pw,p_units:picks,p_overwrite:true});
    }
    if(res==="ok"||res==="updated"){
      const names=picks.map(pid=>units.find(u=>u.id===pid)?.name).filter(Boolean);
      await modal(`<div class="big">✓</div><h3>投票ありがとうございました！</h3>
        <p class="muted">選んだユニット：<br><strong>${names.map(esc).join("、")}</strong></p>
        <button class="primary" onclick="closeModal()">閉じる</button>`);
    }else{toast("送信に失敗しました");}
  };
}

router();
</script>
